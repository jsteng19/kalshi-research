# Speaker Registry for Mention Markets
# Maps speakers to their data sources and collection strategies
#
# Strategies:
#   - youtube_channel: Fetch from a specific YouTube channel
#   - youtube_search: Search YouTube for videos with speaker
#   - factbase: Use Factbase API (for politicians on Roll Call)
#   - web_scrape: Use Firecrawl/Playwright to scrape specific sites
#   - agent_discover: Let agent figure out how to collect data
#
# When a new market is discovered and speaker isn't in this registry,
# the system falls back to agent_discover mode.

speakers:
  # ========================================
  # GOVERNMENT / POLITICS
  # ========================================
  
  bessent:
    name: "Scott Bessent"
    aliases: ["Scott Bessent", "Bessent", "Treasury Secretary Bessent"]
    role: "Treasury Secretary"
    data_dir: "data-mentions/politics/bessent"
    strategy: youtube_search
    youtube_config:
      search_queries:
        - "Scott Bessent press briefing"
        - "Scott Bessent Treasury remarks"
        - "Scott Bessent interview"
      prefer_channels:
        - "C-SPAN"
        - "Bloomberg Television"
        - "CNBC"
    transcript_sources:
      - "https://home.treasury.gov/news/press-releases"
    notes: "Treasury Secretary - check official Treasury site for transcripts"

  leavitt:
    name: "Karoline Leavitt"
    aliases: ["Karoline Leavitt", "Leavitt", "Press Secretary Leavitt"]
    role: "White House Press Secretary"
    data_dir: "data-mentions/politics/leavitt"
    strategy: youtube_search
    youtube_config:
      search_queries:
        - "Karoline Leavitt press briefing"
        - "White House press briefing"
      prefer_channels:
        - "The White House"
        - "C-SPAN"
    transcript_sources:
      - "https://www.whitehouse.gov/briefing-room/"
    notes: "Press Secretary - White House YouTube has official uploads"

  vance:
