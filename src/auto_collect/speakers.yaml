    youtube_config:
      search_queries:
        - "JD Vance remarks"
        - "JD Vance speech"
      prefer_channels:
        - "C-SPAN"
        - "The White House"
    notes: "VP Vance - Factbase has good coverage, YouTube as backup"

  aoc:
    name: "Alexandria Ocasio-Cortez"
    aliases: ["AOC", "Alexandria Ocasio-Cortez", "Ocasio-Cortez"]
    role: "Congresswoman"
    data_dir: "data-mentions/politics/aoc"
    strategy: youtube_search
    youtube_config:
      search_queries:
        - "AOC press conference"
        - "Alexandria Ocasio-Cortez speech"
        - "AOC remarks"
      prefer_channels:
        - "C-SPAN"
    notes: "AOC - check her official YouTube and C-SPAN"

  hochul:
    name: "Kathy Hochul"
    aliases: ["Kathy Hochul", "Hochul", "Governor Hochul"]
    role: "Governor of New York"
    data_dir: "data-mentions/politics/hochul"
    strategy: youtube_search
    youtube_config:
      search_queries:
        - "Kathy Hochul budget address"
        - "Governor Hochul remarks"
      prefer_channels:
        - "New York State"
    transcript_sources:
      - "https://www.governor.ny.gov/"
    notes: "NY Governor - state website has transcripts"

  starmer:
    name: "Keir Starmer"
    aliases: ["Keir Starmer", "Starmer", "Prime Minister Starmer"]
    role: "UK Prime Minister"
    data_dir: "data-mentions/politics/starmer"
    strategy: youtube_search
    youtube_config:
      search_queries:
        - "Keir Starmer PMQs"
        - "Prime Minister's Questions Starmer"
      prefer_channels:
        - "UK Parliament"
    transcript_sources:
      - "https://hansard.parliament.uk/"
    notes: "UK PM - Hansard has official PMQ transcripts"

  johnson_mike:
    name: "Mike Johnson"
    aliases: ["Mike Johnson", "Speaker Johnson"]
    role: "Speaker of the House"
    data_dir: "data-mentions/politics/johnson"
