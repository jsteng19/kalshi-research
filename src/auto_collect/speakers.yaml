# ========================================
# EVENT TYPE MAPPINGS
# ========================================
# Maps event types to collection strategies and search patterns

event_types:
  press_briefing:
    default_strategy: youtube_search
    search_suffix: "press briefing full"
    prefer_channels:
      - "C-SPAN"
      - "The White House"
    transcript_check:
      - "whitehouse.gov"
      - "state.gov"
      
  interview:
    default_strategy: youtube_search
    search_suffix: "interview full"
    prefer_channels:
      - "CNBC"
      - "Bloomberg Television"
      - "Fox News"
      - "CNN"

  late_night:
    default_strategy: youtube_channel
    search_suffix: "full interview"
    notes: "Usually on show's official YouTube channel"
    
  speech:
    default_strategy: youtube_search
    search_suffix: "full speech remarks"
    prefer_channels:
      - "C-SPAN"
      
  podcast:
    default_strategy: youtube_search
    search_suffix: "full episode"
    
  congressional_hearing:
    default_strategy: youtube_search
    search_suffix: "hearing testimony"
    prefer_channels:
      - "C-SPAN"
    transcript_sources:
      - "congress.gov"


# ========================================
# COLLECTION DEFAULTS
# ========================================

defaults:
  youtube:
    min_delay: 8.0
    max_delay: 15.0
    max_retries: 5
    use_proxy: true
    prefer_manual_captions: true
    
  web_scrape:
    timeout_ms: 60000
    wait_after_load_ms: 3500
    max_retries: 3
    
  data_format:
    filename_pattern: "{date}_{title}.txt"
    date_format: "%Y-%m-%d"
